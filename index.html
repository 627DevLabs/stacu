<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STACU</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hero-bg">
    <h1>STACU</h1>
    <p>The Operating System for Everyday AI</p>
  </div>

  <!-- 3D SLIDER -->
  <div class="scene">
    <div class="slider">

      <span style="--i:1"><div class="card">CV</div></span>
      <span style="--i:2"><div class="card">Logos</div></span>
      <span style="--i:3"><div class="card">UI</div></span>
      <span style="--i:4"><div class="card">Posters</div></span>
      <span style="--i:5"><div class="card">Social</div></span>
      <span style="--i:6"><div class="card">Portfolio</div></span>

    </div>
  </div>

  <!-- CTA -->
  <div class="cta">
    <button>Coming Soon on Google Play</button>
  </div>

</section>

</body>
</html>
