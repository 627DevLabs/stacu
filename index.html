<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STACU</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

  <div class="top">
    <h1>STACU</h1>
    <p>The Operating System for Everyday AI</p>
  </div>

  <!-- 🔥 ORIGINAL 3D SLIDER (UNCHANGED) -->
  <div class="middle">
    <div class="scene">
      <div class="slider">

        <span style="--i:0"><div class="card"><img src="img/img1.png"></div></span>
        <span style="--i:1"><div class="card"><img src="img/img2.png"></div></span>
        <span style="--i:2"><div class="card"><img src="img/img3.png"></div></span>
        <span style="--i:3"><div class="card"><img src="img/img4.png"></div></span>
        <span style="--i:4"><div class="card"><img src="img/img5.png"></div></span>
        <span style="--i:5"><div class="card"><img src="img/img6.png"></div></span>

      </div>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <!-- COUNTDOWN -->
<div class="countdown">

  <p class="countdown-title">Time remaining to Launch</p>

  <h2 id="timerTop">Loading...</h2>

 <div class="play-row">
  <span>Coming soon to</span>
  <img src="img/google-play.png" alt="Google Play">
</div>

</div>

</section>

<!-- 🔥 SHOWCASE -->
<section class="showcase">

  <img src="img/stacu1.png">
  <img src="img/stacu2.png">
  <img src="img/stacu3.png">
  <img src="img/stacu4.png">
  <img src="img/stacu5.png">
  <img src="img/stacu6.png">
  <img src="img/stacu7.png">
  <img src="img/stacu8.png">
  <img src="img/stacu9.png">
  <img src="img/stacu10.png">
  <img src="img/stacu11.png">
  <img src="img/stacu12.png">

</section>

<!-- 🔥 BIG COUNTDOWN -->
<section class="final-countdown">
  <h1 id="timerBottom">Loading...</h1>
</section>

<!-- 🔥 MODAL SLIDER -->
<div id="modal" class="modal">
  <span class="close">&times;</span>

  <img id="modalImage" class="modal-img">

  <button class="nav prev">&#10094;</button>
  <button class="nav next">&#10095;</button>
</div>

<div class="footer">
  © 2026 (c) 627 Cooperations... til the job is done
</div>

<script src="script.js"></script>

</body>
</html>
