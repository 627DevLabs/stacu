<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STACU</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

  <div class="hero-text">
    <h1>STACU</h1>
    <h2>The Operating System for Everyday AI</h2>
    <p>Create CVs, Designs, Logos & More — Instantly</p>
    <button>Coming Soon on Google Play</button>
  </div>

  <!-- 3D SLIDER -->
  <div class="slider">

    <span style="--i:1">
      <div class="card">CV</div>
    </span>

    <span style="--i:2">
      <div class="card">Business Card</div>
    </span>

    <span style="--i:3">
      <div class="card">UI Design</div>
    </span>

    <span style="--i:4">
      <div class="card">Poster</div>
    </span>

    <span style="--i:5">
      <div class="card">Logo</div>
    </span>

    <span style="--i:6">
      <div class="card">Portfolio</div>
    </span>

  </div>

</section>

</body>
</html>
